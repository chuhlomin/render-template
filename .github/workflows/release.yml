name: release

on:
  push:
    tags:
      - 'v1.*'

env:
  DOCKER_IMAGE: chuhlomin/render-template

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Get the tag
        id: get_tag
        run: echo "tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: chuhlomin
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.get_tag.outputs.tag }}
            ghcr.io/${{ env.DOCKER_IMAGE }}:${{ steps.get_tag.outputs.tag }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7

  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tag:
    runs-on: ubuntu-latest
    environment: v1 # requires approval
    needs: [release, goreleaser]
    if: startsWith(github.ref, 'refs/tags/v1.')
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Update v1 tag
        shell: bash
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "gha@chuhlomin.com"
          git tag -f v1
          git push -f origin v1
